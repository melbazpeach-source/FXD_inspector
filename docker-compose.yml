version: "3.9"

# ─────────────────────────────────────────────────────────────────
# FXD Inspector — Docker Compose Stack
# Services: app, mysql, nginx (optional reverse proxy)
# ─────────────────────────────────────────────────────────────────

services:

  # ── Application ─────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fxd-inspector-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: mysql://fxdinspector:${MYSQL_PASSWORD}@mysql:3306/fxdinspector
      JWT_SECRET: ${JWT_SECRET}
      # Manus OAuth (replace with your own OAuth provider or remove if using local auth)
      VITE_APP_ID: ${VITE_APP_ID}
      OAUTH_SERVER_URL: ${OAUTH_SERVER_URL}
      VITE_OAUTH_PORTAL_URL: ${VITE_OAUTH_PORTAL_URL}
      OWNER_OPEN_ID: ${OWNER_OPEN_ID}
      OWNER_NAME: ${OWNER_NAME}
      # AI / LLM
      BUILT_IN_FORGE_API_URL: ${BUILT_IN_FORGE_API_URL}
      BUILT_IN_FORGE_API_KEY: ${BUILT_IN_FORGE_API_KEY}
      VITE_FRONTEND_FORGE_API_KEY: ${VITE_FRONTEND_FORGE_API_KEY}
      VITE_FRONTEND_FORGE_API_URL: ${VITE_FRONTEND_FORGE_API_URL}
      # S3 / Storage (use any S3-compatible provider: AWS, Cloudflare R2, MinIO)
      S3_BUCKET: ${S3_BUCKET}
      S3_REGION: ${S3_REGION}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY}
      S3_ENDPOINT: ${S3_ENDPOINT:-}
      # Palace API (optional)
      PALACE_API_KEY: ${PALACE_API_KEY:-}
      PALACE_BASE_URL: ${PALACE_BASE_URL:-https://api.getpalace.com/v1}
      # MagicPlan (optional)
      MAGICPLAN_API_KEY: ${MAGICPLAN_API_KEY:-}
      MAGICPLAN_CUSTOMER_ID: ${MAGICPLAN_CUSTOMER_ID:-}
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - fxd-inspector-network
    volumes:
      - app-logs:/app/logs

  # ── MySQL Database ───────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: fxd-inspector-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: fxdinspector
      MYSQL_USER: fxdinspector
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - "3306:3306"  # Remove this line in production if not needed externally
    volumes:
      - mysql-data:/var/lib/mysql
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "fxdinspector", "-p${MYSQL_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - fxd-inspector-network

  # ── Nginx Reverse Proxy (optional, for SSL termination) ──────────
  # Uncomment this block if you want Nginx in front of the app
  # nginx:
  #   image: nginx:alpine
  #   container_name: fxd-inspector-nginx
  #   restart: unless-stopped
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #   volumes:
  #     - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
  #     - ./nginx/ssl:/etc/nginx/ssl:ro
  #     - nginx-logs:/var/log/nginx
  #   depends_on:
  #     - app
  #   networks:
  #     - fxd-inspector-network

networks:
  fxd-inspector-network:
    driver: bridge

volumes:
  mysql-data:
    driver: local
  app-logs:
    driver: local
  # nginx-logs:
  #   driver: local
